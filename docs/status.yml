    name: Foundations
    blurb: store, trace graph, type-gen, fixtures
    status: done            # not-started | research | building | done
    research_note: docs/research/00-foundations.md
    research_published: true
  - id: 1
    name: Knowledge capture & discipline
    blurb: band pill, provenance chip, encoding firewall, K10 refusal
    status: done
    research_note: docs/research/01-knowledge.md
    research_published: true
  - id: 2
    name: Compile
    blurb: knowledge → stamped world channels (sparse)
    status: done
    research_note: docs/research/02-compile.md
    research_published: true
  - id: 3
    name: Score, then plan
    blurb: four-stop banded verdicts, oracle cases, the generated handful
    status: done
    research_note: docs/research/03-score-plan.md
    research_published: true
  - id: 4
    name: Least-worst
    blurb: relaxation under infeasibility (thesis B)
    status: done
    research_note: docs/research/04-relaxation.md
    research_published: true
  - id: 5
    name: Scenario robustness
    blurb: scoring across the adversary COA set (thesis C)
    status: done
    research_note: docs/research/06-robustness.md
    research_published: true
  - id: 6
    name: Analysis loops
    blurb: sensitivity, discrimination, staleness (theses D, E, F)
    status: done
    research_note: docs/research/08-analysis.md
    research_published: true
  - id: 7
    name: Surfaces & narratives
    blurb: role bundles + five narrative scripts (post-gate)
    status: not-started
    research_note: docs/research/07-narratives.md
    research_published: false

