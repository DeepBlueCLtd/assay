  - date: 2026-07-14
    note: >-
      Register batch 5 ratified (ASSAY-DEC-35): civil harm stays a geometric red line,
      never a quantified metric (issue #41). C3 counts whether FE-FALCON fires into the
      populated port district — it does not weight by population. Whether firing into
      55,000 is "worse" than 5,000 is a commander value judgement the system is forbidden
