# ASSAY — single source of truth for site progress (comms plan §5).
#
# Editing THIS file is the intended way progress changes on the public site.
# It is the communications analogue of the content-addressed store: one
# authoritative object, many projections (the Home badge, the roadmap tracker,
# the updates feed, the blog index).
#
# Honesty guardrails baked in (comms plan §5, §1.1):
#   - `status: building` is dishonest before `research_published: true` — the
#     research-first gate (DEC-11) made visible in data.
#   - `current_stage_label` must match what the hand-authored Home page shows;
#     `scripts/build-site.ts` asserts this at build time and fails on drift, so
#     the site polices its own optimism rather than trusting a human to.
#   - Nothing here may show a capability the repository does not contain.

