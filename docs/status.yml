# ASSAY — single source of truth for site progress (comms plan §5).
#
# Editing THIS file is the intended way progress changes on the public site.
# It is the communications analogue of the content-addressed store: one
# authoritative object, many projections (the Home badge, the roadmap tracker,
# the updates feed, the blog index).
#
# Honesty guardrails baked in (comms plan §5, §1.1):
#   - `status: building` is dishonest before `research_published: true` — the
#     research-first gate (DEC-11) made visible in data.
#   - `current_stage_label` must match what the hand-authored Home page shows;
#     `scripts/build-site.ts` asserts this at build time and fails on drift, so
#     the site polices its own optimism rather than trusting a human to.
#   - Nothing here may show a capability the repository does not contain.

updated: 2026-07-15
current_stage: 7            # 0..7, the stage in flight
current_stage_label: "Stage 6 built · Stage 7 next"
gate_passed: false          # the spine-complete gate (SPEC-15)

stages:
  - id: 0
    name: Foundations
    blurb: store, trace graph, type-gen, fixtures
    status: done            # not-started | research | building | done
    research_note: docs/research/00-foundations.md
    research_published: true
  - id: 1
    name: Knowledge capture & discipline
    blurb: band pill, provenance chip, encoding firewall, K10 refusal
    status: done
    research_note: docs/research/01-knowledge.md
    research_published: true
  - id: 2
    name: Compile
    blurb: knowledge → stamped world channels (sparse)
    status: done
    research_note: docs/research/02-compile.md
    research_published: true
  - id: 3
    name: Score, then plan
    blurb: four-stop banded verdicts, oracle cases, the generated handful
    status: done
    research_note: docs/research/03-score-plan.md
    research_published: true
  - id: 4
    name: Least-worst
    blurb: relaxation under infeasibility (thesis B)
    status: done
    research_note: docs/research/04-relaxation.md
    research_published: true
  - id: 5
    name: Scenario robustness
    blurb: scoring across the adversary COA set (thesis C)
    status: done
    research_note: docs/research/06-robustness.md
    research_published: true
  - id: 6
    name: Analysis loops
    blurb: sensitivity, discrimination, staleness (theses D, E, F)
    status: done
    research_note: docs/research/08-analysis.md
    research_published: true
  - id: 7
    name: Surfaces & narratives
    blurb: role bundles + five narrative scripts (post-gate)
    status: not-started
    research_note: docs/research/09-narratives.md
    research_published: true

